<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Tunnel | Pro</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --surface-hover: #161616;
            --border: #1f1f1f;
            --text: #ffffff;
            --text-muted: #a1a1aa;
            --accent: #ffffff;
            --accent-muted: #27272a;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
            --radius: 8px;
            --sidebar-width: 300px;
        }

        * { box-sizing: border-box; outline: none; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Sidebar */
        aside { 
            width: var(--sidebar-width); 
            background: var(--surface); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 24px;
            flex-shrink: 0;
        }

        .logo { 
            font-size: 16px; 
            font-weight: 800; 
            letter-spacing: -0.5px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 32px;
            color: var(--text);
        }

        .section-label { 
            font-size: 11px; 
            font-weight: 700; 
            text-transform: uppercase; 
            color: var(--text-muted); 
            letter-spacing: 0.05em; 
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .session-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex: 1; }
        .session-card { 
            background: var(--bg); 
            border: 1px solid var(--border); 
            border-radius: var(--radius); 
            padding: 12px; 
            cursor: pointer; 
            transition: all 0.2s; 
            position: relative;
        }
        .session-card:hover { border-color: var(--blue); background: var(--surface-hover); }
        .session-card.active { border-color: var(--blue); background: #1d4ed81a; }
        .session-card .name { font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px; }
        .session-card .host { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
        .btn-del { 
            position: absolute; top: 12px; right: 12px; opacity: 0; 
            background: none; border: none; color: var(--red); 
            cursor: pointer; padding: 4px; font-size: 12px; transition: 0.2s;
        }
        .session-card:hover .btn-del { opacity: 1; }

        /* Main Content */
        main { 
            flex: 1; 
            overflow-y: auto; 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            gap: 32px; 
            max-width: 1200px; 
            margin: 0 auto; 
            width: 100%;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; }
        
        .card { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: var(--radius); 
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .field { display: flex; flex-direction: column; gap: 8px; }
        .field label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
        
        input { 
            background: var(--bg); 
            border: 1px solid var(--border); 
            border-radius: var(--radius); 
            color: var(--text); 
            padding: 10px 12px; 
            font-size: 13px; 
            width: 100%; 
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .input-with-icon { padding-left: 36px; }
        .input-group { position: relative; }
        .input-group i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }
        input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px #3b82f633; }

        button { 
            padding: 12px 16px; 
            border-radius: var(--radius); 
            font-size: 13px; 
            font-weight: 600; 
            cursor: pointer; 
            border: 1px solid var(--border); 
            transition: 0.2s; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
        }
        button.primary { background: var(--text); color: var(--bg); border: none; }
        button.primary:hover { opacity: 0.9; transform: translateY(-1px); }
        button.secondary { background: var(--bg); color: var(--text); }
        button.secondary:hover { background: var(--surface-hover); border-color: var(--text-muted); }
        button.danger { background: #450a0a; color: #fca5a5; border-color: #7f1d1d; }
        button.danger:hover { background: #7f1d1d; color: white; }
        button.ghost { background: transparent; border: none; color: var(--text-muted); padding: 4px 8px; }
        button.ghost:hover { color: var(--text); background: var(--accent-muted); }

        /* Explorer */
        .explorer-container { 
            background: var(--bg); 
            border: 1px solid var(--border); 
            border-radius: var(--radius); 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            height: 240px;
        }
        .explorer-container.expanded { height: 500px; }
        .explorer-header { padding: 8px 12px; background: var(--surface-hover); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .explorer-path { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .explorer-search { padding: 8px; border-bottom: 1px solid var(--border); }
        .explorer-search input { padding: 6px 10px; font-size: 12px; }
        .explorer-list { flex: 1; overflow-y: auto; padding: 4px; }
        .explorer-item { padding: 8px 12px; font-size: 12px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.1s; }
        .explorer-item:hover { background: var(--surface-hover); }
        .explorer-item i { color: var(--text-muted); font-size: 14px; }
        .explorer-item.folder i { color: var(--blue); }
        .explorer-item.selected { background: #3b82f61a; color: var(--blue); font-weight: 600; }

        /* Progress Bar */
        .sync-progress-container { margin-top: 12px; display: none; }
        .progress-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
        .progress-bg { background: var(--accent-muted); height: 6px; border-radius: 10px; overflow: hidden; position: relative; }
        .progress-fill { background: var(--blue); height: 100%; width: 0%; transition: width 0.5s ease; box-shadow: 0 0 10px var(--blue); }

        /* Terminal */
        .terminal { background: #000; border: 1px solid var(--border); border-radius: var(--radius); font-family: 'JetBrains Mono', monospace; font-size: 12px; height: 350px; display: flex; flex-direction: column; margin-top: 20px; }
        .term-header { padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .term-body { padding: 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .log-line { display: flex; gap: 12px; padding: 4px 0; border-bottom: 1px solid #111; }
        .log-type { font-weight: 700; font-size: 10px; padding: 2px 6px; border-radius: 4px; height: fit-content; text-transform: uppercase; }
        .log-type.exec { background: var(--accent-muted); color: var(--text); }
        .log-type.out { background: #22c55e22; color: var(--green); }
        .log-type.err { background: #ef444422; color: var(--red); }
        .log-type.sys { background: #3b82f622; color: var(--blue); }
        .log-content { white-space: pre-wrap; word-break: break-all; color: var(--text); flex: 1; line-height: 1.4; }

        /* Loading */
        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 20px; backdrop-filter: blur(2px); color: white; }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--accent-muted); border-top-color: var(--text); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Status */
        .status-badge { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-muted); }
        .status-dot.active { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .status-dot.syncing { background: var(--blue); box-shadow: 0 0 10px var(--blue); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Switch */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--accent-muted); transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--green); }
        input:checked + .slider:before { transform: translateX(16px); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--accent-muted); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-txt" style="font-size:14px; font-weight:500; text-align: center; max-width: 80%;">CONNECTING...</div>
        <button onclick="document.getElementById('loading').style.display='none'" class="secondary" style="margin-top:20px; color:white; border:1px solid rgba(255,255,255,0.2); background: transparent;">Hide Overlay</button>
    </div>

    <aside>
        <div class="logo"><i data-lucide="shield-check" style="color: var(--blue)"></i> AGENT TUNNEL</div>

        <section style="flex: 1; display: flex; flex-direction: column;">
            <div class="section-label"><i class="fas fa-history"></i> Recent Sessions</div>
            <div id="session-list" class="session-list"></div>
            <button onclick="newSession()" class="secondary" style="width:100%; margin-top:16px;"><i data-lucide="plus"></i> New Tunnel</button>
        </section>

        <section style="margin-top: 40px; display:flex; flex-direction:column; gap:16px;">
            <div class="section-label"><i class="fas fa-sliders-h"></i> Global Settings</div>
            
            <div style="display:flex; flex-direction:column; gap:10px; background:var(--bg); border:1px solid var(--border); padding:12px; border-radius:var(--radius);">
                <div style="display:flex; align-items:center; justify-content:space-between;">
                    <span style="font-size:11px; font-weight:500;">Terminal Hook</span>
                    <label class="switch">
                        <input type="checkbox" id="toggle-intercept" onchange="updateSettings()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div style="display:flex; flex-direction:column; gap:6px; margin-top:8px;">
                    <span style="font-size:10px; font-weight:600; color:var(--text-muted); text-transform:uppercase;">Instruction Filename</span>
                    <input id="instruction_filename" onchange="updateSettings()" placeholder="GEMINI.md" style="font-size:11px; padding:6px 8px; font-family:'JetBrains Mono';">
                </div>
            </div>

            <div class="section-label"><i class="fas fa-broadcast-tower"></i> Tunnel Status</div>
            <div class="status-badge">
                <div id="status-dot" class="status-dot"></div>
                <span id="status-text" style="font-size:12px; font-weight:600;">Offline</span>
            </div>

            <div id="sync-progress-box" class="sync-progress-container">
                <div class="progress-label">
                    <span id="sync-status-msg">Syncing...</span>
                    <span id="sync-percent">0%</span>
                </div>
                <div class="progress-bg"><div id="sync-bar" class="progress-fill"></div></div>
                <div id="sync-details" style="font-size: 9px; color: var(--text-muted); margin-top: 6px; font-family: monospace;"></div>
            </div>
        </section>
    </aside>

    <main>
        <div class="grid-2">
            <div class="card">
                <div class="section-label"><i class="fas fa-network-wired"></i> Remote Target</div>
                <div class="field"><label>Friendly Name</label><input id="session_name" placeholder="e.g. Router-Lab"></div>
                <div class="field"><label>Remote Host (IP or Domain)</label><div class="input-group"><i class="fas fa-globe"></i><input id="host" class="input-with-icon" placeholder="192.168.1.1"></div></div>
                <div style="display: grid; grid-template-columns: 1fr 1.2fr; gap: 16px;">
                    <div class="field"><label>Username</label><div class="input-group"><i class="fas fa-user"></i><input id="user" class="input-with-icon" placeholder="root"></div></div>
                    <div class="field"><label>Auth Password</label><div class="input-group"><i class="fas fa-shield-alt"></i><input type="password" id="pass" class="input-with-icon" placeholder="••••••••"></div></div>
                </div>
                <button onclick="testSSH()" class="secondary" id="btn-test" style="margin-top: 10px;"><i class="fas fa-flask"></i> Verify SSH Access</button>
            </div>

            <div class="card">
                <div class="section-label"><i class="fas fa-map-marked-alt"></i> Sync Map</div>
                <div class="field">
                    <label>Local Working Directory</label>
                    <div id="local-container" class="explorer-container">
                        <div class="explorer-header"><span class="explorer-path" id="local-nav">...</span><button class="ghost" onclick="toggleExpand('local-container')"><i data-lucide="maximize-2"></i></button></div>
                        <div class="explorer-search"><input type="text" placeholder="Filter..." oninput="filterExplorer('local-list', this.value)"></div>
                        <div id="local-list" class="explorer-list"></div>
                    </div>
                    <div id="local-sel" style="font-size:10px; margin-top:6px; color: var(--blue); font-family: monospace;">Not mapped</div>
                </div>
                <div class="field">
                    <label>Remote Base Directory</label>
                    <div id="remote-container" class="explorer-container">
                        <div class="explorer-header"><span class="explorer-path" id="remote-nav">/</span><button class="ghost" onclick="toggleExpand('remote-container')"><i data-lucide="maximize-2"></i></button></div>
                        <div class="explorer-search"><input type="text" placeholder="Filter..." oninput="filterExplorer('remote-list', this.value)"></div>
                        <div id="remote-list" class="explorer-list"></div>
                    </div>
                    <div id="remote-sel" style="font-size:10px; margin-top:6px; color: var(--blue); font-family: monospace;">Not mapped</div>
                </div>
            </div>
        </div>

        <div style="display: flex; gap: 16px;">
            <button onclick="activateBridge()" class="primary" style="flex: 1; height: 54px; font-size: 15px; background: var(--blue); color: white;"><i class="fas fa-link"></i> ESTABLISH TUNNEL</button>
            <button onclick="stopBridge()" class="danger" style="height: 54px; font-size: 15px; padding: 0 24px;"><i class="fas fa-stop-circle"></i> STOP</button>
        </div>

        <div class="terminal">
            <div class="term-header"><span class="section-label" style="margin:0; color:var(--text);"><i class="fas fa-stream"></i> Tunnel Traffic</span><button class="ghost" onclick="clearLogs()"><i data-lucide="eraser"></i></button></div>
            <div id="term-body" class="term-body"></div>
        </div>
    </main>

    <script>
        let sessions = {}, selLocal = '', selRemote = '', explorersData = { 'local-list': null, 'remote-list': null };

        async function init() {
            lucide.createIcons();
            await loadSettings();
            await loadConfigs();
            setupSSE();
            setInterval(checkStatus, 2500); 
            checkStatus();
            browseLocal('');
        }

        async function loadSettings() {
            const r = await fetch('/api/settings');
            const settings = await r.json();
            document.getElementById('toggle-intercept').checked = settings.intercept_terminal;
            document.getElementById('instruction_filename').value = settings.instruction_filename || 'GEMINI.md';
        }

        async function updateSettings() {
            const intercept_terminal = document.getElementById('toggle-intercept').checked;
            const instruction_filename = document.getElementById('instruction_filename').value || 'GEMINI.md';
            await fetch('/api/settings', { method: 'POST', body: JSON.stringify({ intercept_terminal, instruction_filename }) });
        }

        function setupSSE() {
            const ev = new EventSource('/api/log-stream');
            ev.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'system' || data.type === 'error') {
                    const txt = document.getElementById('loading-txt');
                    if (txt) txt.innerText = (data.message || data.output || 'Connecting...').substring(0, 60);
                }
                const body = document.getElementById('term-body');
                const line = document.createElement('div');
                line.className = 'log-line';
                let typeClass = 'sys', typeLabel = 'TUNNEL', content = data.output || data.cmd || data.message || '';
                if(data.type === 'command') { typeClass = 'exec'; typeLabel = 'REMOTE'; }
                if(data.type === 'result') { typeClass = data.exit_code === 0 ? 'out' : 'err'; typeLabel = 'TRAFFIC'; }
                if(data.type === 'error') { typeClass = 'err'; typeLabel = 'ERROR'; }
                line.innerHTML = `<div class="log-type ${typeClass}">${typeLabel}</div><div class="log-content">${content.replace(/</g, '&lt;')}</div>`;
                body.appendChild(line);
                body.scrollTop = body.scrollHeight;
            };
        }

        async function loadConfigs() {
            const r = await fetch('/api/get-configs');
            sessions = await r.json();
            const list = document.getElementById('session-list');
            list.innerHTML = '';
            Object.keys(sessions).forEach(name => {
                const s = sessions[name];
                const div = document.createElement('div');
                div.className = 'session-card';
                div.innerHTML = `<span class="name">${name}</span><span class="host">${s.user}@${s.host}</span><button class="btn-del" onclick="deleteSession(event, '${name}')"><i class="fas fa-times"></i></button>`;
                div.onclick = () => loadSession(name);
                list.appendChild(div);
            });
        }

        function loadSession(name) {
            const s = sessions[name];
            document.getElementById('session_name').value = name;
            document.getElementById('host').value = s.host;
            document.getElementById('user').value = s.user;
            document.getElementById('pass').value = s.password || '';
            selLocal = s.local_path; selRemote = s.remote_path;
            document.getElementById('local-sel').innerText = selLocal;
            document.getElementById('remote-sel').innerText = selRemote;
            browseLocal(selLocal); browseRemote(selRemote);
            document.querySelectorAll('.session-card').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        async function browseLocal(path) {
            const r = await fetch('/api/ls-local', { method: 'POST', body: JSON.stringify({ path }) });
            const data = await r.json();
            explorersData['local-list'] = data;
            document.getElementById('local-nav').innerText = data.current;
            selLocal = data.current;
            document.getElementById('local-sel').innerText = selLocal;
            renderExp('local-list', data, browseLocal, (p) => { selLocal = p; document.getElementById('local-sel').innerText = p; });
        }

        async function browseRemote(path = '/') {
            const host = document.getElementById('host').value, user = document.getElementById('user').value, pass = document.getElementById('pass').value;
            if (!host || !user) return;
            const r = await fetch('/api/ls-remote', { method: 'POST', body: JSON.stringify({ host, user, password: pass, remote_path: path }) });
            const data = await r.json();
            if (data.error) return;
            explorersData['remote-list'] = data;
            document.getElementById('remote-nav').innerText = data.current;
            selRemote = data.current;
            document.getElementById('remote-sel').innerText = selRemote;
            renderExp('remote-list', data, browseRemote, (p) => { selRemote = p; document.getElementById('remote-sel').innerText = p; });
        }

        function filterExplorer(id, query) {
            const list = explorersData[id];
            if (!list || !list.dirs) return;
            const filteredDirs = list.dirs.filter(d => d.toLowerCase().includes(query.toLowerCase()));
            renderExp(id, { ...list, dirs: filteredDirs }, id === 'local-list' ? browseLocal : browseRemote, (p) => {
                if (id === 'local-list') { selLocal = p; document.getElementById('local-sel').innerText = p; }
                else { selRemote = p; document.getElementById('remote-sel').innerText = p; }
            });
        }

        function renderExp(id, data, onNav, onSel) {
            const el = document.getElementById(id); el.innerHTML = '';
            const up = document.createElement('div'); up.className = 'explorer-item'; 
            up.innerHTML = '<i class="fas fa-chevron-up"></i> .. [Go Up]';
            up.onclick = () => { let p = data.current.split('/').filter(x=>x); p.pop(); onNav('/'+p.join('/')); };
            el.appendChild(up);
            const selCurrent = document.createElement('div'); selCurrent.className = 'explorer-item selected';
            selCurrent.innerHTML = '<i class="fas fa-crosshairs"></i> [Select Folder]';
            selCurrent.onclick = () => { onSel(data.current); };
            el.appendChild(selCurrent);
            data.dirs.forEach(d => {
                const item = document.createElement('div'); item.className = 'explorer-item folder'; 
                item.innerHTML = '<i class="fas fa-folder"></i> ' + d;
                item.onclick = () => onNav(data.current + (data.current.endsWith('/') ? '' : '/') + d);
                el.appendChild(item);
            });
        }

        async function checkStatus() {
            try {
                const r = await fetch('/api/sessions');
                const data = await r.json();
                const out = data.output || '';
                const dot = document.getElementById('status-dot');
                const txt = document.getElementById('status-text');
                const progBox = document.getElementById('sync-progress-box');
                
                const isWatching = out.includes("Status: Watching for changes");
                const isStaging = out.includes("Status: Staging") || out.includes("Status: Synchronizing") || out.includes("Status: Reconciling");
                const isActive = out.includes("Name:");

                if (isWatching) {
                    dot.className = 'status-dot active'; txt.innerText = 'Stable Connection'; progBox.style.display = 'none';
                } else if (isStaging) {
                    dot.className = 'status-dot syncing'; txt.innerText = 'Synchronizing...'; progBox.style.display = 'block';
                    const matchPercent = out.match(/(\d+)%/), matchEntries = out.match(/(\d+\/\d+ entries)/) || out.match(/(\d+ entries)/), statusMsg = out.match(/Status: ([^\n\(]+)/);
                    if (matchPercent) { document.getElementById('sync-percent').innerText = matchPercent[0]; document.getElementById('sync-bar').style.width = matchPercent[0]; }
                    else { document.getElementById('sync-percent').innerText = '...'; document.getElementById('sync-bar').style.width = '100%'; }
                    if (statusMsg) document.getElementById('sync-status-msg').innerText = statusMsg[1].trim();
                    if (matchEntries) document.getElementById('sync-details').innerText = matchEntries[0];
                } else if (isActive) {
                    dot.className = 'status-dot syncing'; txt.innerText = 'Establishing...'; progBox.style.display = 'block';
                } else {
                    dot.className = 'status-dot'; txt.innerText = 'Offline'; progBox.style.display = 'none';
                }
            } catch(e) {}
        }

        async function activateBridge() {
            const name = document.getElementById('session_name').value, host = document.getElementById('host').value, user = document.getElementById('user').value, pass = document.getElementById('pass').value;
            if (!name || !host || !user || !selLocal || !selRemote) { alert('Fill all fields and select paths.'); return; }
            document.getElementById('loading').style.display = 'flex';
            try {
                const r = await fetch('/api/config', { method: 'POST', body: JSON.stringify({ session_name: name, host, user, password: pass, local_path: selLocal, remote_path: selRemote }) });
                document.getElementById('loading').style.display = 'none';
                const data = await r.json();
                if (data.status === 'warning') { alert(data.message); window.open('/help.html', '_blank'); }
                else if (r.ok) { alert('Tunnel Online!'); }
                else { alert('Tunnel Failure: ' + data.message); window.open('/help.html', '_blank'); }
                loadConfigs();
            } catch(e) { document.getElementById('loading').style.display = 'none'; alert('Error: ' + e.message); window.open('/help.html', '_blank'); }
        }

        async function stopBridge() {
            const name = document.getElementById('session_name').value;
            if (!name) { alert('Select a session to stop.'); return; }
            if (!confirm(`Stop tunnel for "${name}"?`)) return;
            try {
                const r = await fetch('/api/stop-session', { method: 'POST', body: JSON.stringify({ name }) });
                const data = await r.json();
                if (r.ok) alert('Tunnel Stopped.');
                else alert('Error: ' + data.message);
                checkStatus();
            } catch(e) { alert('Error: ' + e.message); }
        }

        async function testSSH() {
            const host = document.getElementById('host').value, user = document.getElementById('user').value, pass = document.getElementById('pass').value;
            const btn = document.getElementById('btn-test'); btn.disabled = true; btn.innerText = 'Checking...';
            try {
                const r = await fetch('/api/test-ssh', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({host, user, password: pass}) });
                const data = await r.json();
                alert(data.status === 'success' ? 'SSH Access Confirmed!' : 'Access Denied: ' + data.message);
                if(data.status === 'success') browseRemote('/');
            } catch(e) { alert('Error: ' + e.message); }
            btn.disabled = false; btn.innerText = 'Verify SSH Access';
        }

        function toggleExpand(id) { document.getElementById(id).classList.toggle('expanded'); lucide.createIcons(); }
        async function deleteSession(event, name) { event.stopPropagation(); if (!confirm(`Delete ${name}?`)) return; await fetch('/api/delete-session', { method: 'POST', body: JSON.stringify({ name }) }); loadConfigs(); }
        function clearLogs() { document.getElementById('term-body').innerHTML = ''; }
        function newSession() { document.querySelectorAll('input:not([type=checkbox])').forEach(i => i.value=''); selLocal=''; selRemote=''; document.getElementById('local-sel').innerText='Not mapped'; document.getElementById('remote-sel').innerText='Not mapped'; }

        init();
    </script>
</body>
</html>
